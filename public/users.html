<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users — POS</title>
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .role-admin   { color: var(--danger);  background: rgba(255,79,109,0.1);  }
    .role-manager { color: var(--warning); background: rgba(255,181,71,0.1);  }
    .role-cashier { color: var(--accent2); background: rgba(0,212,170,0.1);   }

    .password-toggle { position: relative; }
    .password-toggle input { padding-right: 40px; }
    .password-toggle .eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 14px; padding: 0;
    }

    .danger-zone {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .danger-zone h4 { font-size: 12px; color: var(--danger); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  </style>
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>requireAuth(); requireRole('admin'); injectShell('users');</script>

<div class="page-header">
  <div>
    <h1>User Management</h1>
    <p>Manage staff accounts and roles</p>
  </div>
  <button class="btn btn-primary" id="add-user-btn">+ Add User</button>
</div>

<!-- Stats row -->
<div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px" id="user-stats">
  <div class="stat-card"><div class="label">Total Staff</div><div class="value accent" id="stat-total">—</div></div>
  <div class="stat-card"><div class="label">Active</div><div class="value success" id="stat-active">—</div></div>
  <div class="stat-card"><div class="label">Inactive</div><div class="value warning" id="stat-inactive">—</div></div>
</div>

<div class="card">
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <input id="search" class="form-control" placeholder="Search by name or username…" style="max-width:280px"/>
    <select id="role-filter" class="form-control" style="width:140px">
      <option value="">All Roles</option>
      <option value="admin">Admin</option>
      <option value="manager">Manager</option>
      <option value="cashier">Cashier</option>
    </select>
    <select id="status-filter" class="form-control" style="width:130px">
      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Username</th>
          <th>Role</th>
          <th>Email</th>
          <th>Status</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="users-table">
        <tr><td colspan="7" class="text-muted text-center">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- User Modal -->
<div class="modal-overlay hidden" id="user-modal">
  <div class="modal" style="max-width:520px">
    <h2 id="modal-title">Add User</h2>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">
      <div class="form-group" style="grid-column:1/-1">
        <label>Full Name *</label>
        <input id="f-fullname" class="form-control" placeholder="e.g. Kwame Mensah"/>
      </div>
      <div class="form-group">
        <label>Username *</label>
        <input id="f-username" class="form-control" placeholder="e.g. kwame.mensah"/>
      </div>
      <div class="form-group">
        <label>Role *</label>
        <select id="f-role" class="form-control">
          <option value="cashier">Cashier</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Email</label>
        <input id="f-email" class="form-control" type="email" placeholder="Optional"/>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label id="password-label">Password *</label>
        <div class="password-toggle">
          <input id="f-password" class="form-control" type="password" placeholder="Min. 6 characters"/>
          <button class="eye-btn" id="toggle-pw" type="button" title="Show/hide password">👁</button>
        </div>
        <div id="pw-hint" class="text-muted mt-1" style="font-size:11px"></div>
      </div>
    </div>

    <!-- Edit-only: status toggle & danger zone -->
    <div id="edit-extras" class="hidden">
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="f-active" checked/>
          <span>Account is active</span>
        </label>
      </div>
      <div class="danger-zone">
        <h4>⚠ Danger Zone</h4>
        <button class="btn btn-danger btn-sm" id="deactivate-btn">Deactivate User</button>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-primary w-full" id="save-user-btn">Create User</button>
      <button class="btn btn-ghost" id="cancel-user-btn">Cancel</button>
    </div>
  </div>
</div>

<script>
let users = [];
let editingId = null;
const currentUser = Auth.getUser();

async function loadUsers() {
  try {
    users = await api.get('/users');
    updateStats(users);
    renderTable(users);
  } catch(e) { toast(e.message, 'error'); }
}

function updateStats(list) {
  const active   = list.filter(u => u.is_active).length;
  const inactive = list.filter(u => !u.is_active).length;
  document.getElementById('stat-total').textContent   = list.length;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-inactive').textContent = inactive;
}

function roleClass(role) {
  return { admin: 'role-admin', manager: 'role-manager', cashier: 'role-cashier' }[role] || '';
}

function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function renderTable(list) {
  const tbody = document.getElementById('users-table');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-muted text-center">No users found</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(u => `
    <tr style="${!u.is_active ? 'opacity:0.5' : ''}">
      <td>
        <div class="user-cell">
          <div class="avatar">${initials(u.full_name)}</div>
          <div>
            <div style="font-weight:600">${u.full_name}</div>
            ${u.id === currentUser.id ? '<div style="font-size:11px;color:var(--accent)">You</div>' : ''}
          </div>
        </div>
      </td>
      <td class="text-mono" style="font-size:12px">${u.username}</td>
      <td><span class="badge ${roleClass(u.role)}">${u.role}</span></td>
      <td class="text-muted">${u.email || '—'}</td>
      <td><span class="badge ${u.is_active ? 'badge-success' : 'badge-danger'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
      <td class="text-muted">${fmt.date(u.created_at)}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="openEdit(${u.id})">Edit</button>
      </td>
    </tr>
  `).join('');
}

function filterTable() {
  const q      = document.getElementById('search').value.toLowerCase();
  const role   = document.getElementById('role-filter').value;
  const status = document.getElementById('status-filter').value;
  let list = users.filter(u => {
    const matchQ = u.full_name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q);
    const matchR = !role   || u.role === role;
    const matchS = !status || (status === 'active' ? u.is_active : !u.is_active);
    return matchQ && matchR && matchS;
  });
  renderTable(list);
}

['search','role-filter','status-filter'].forEach(id =>
  document.getElementById(id).addEventListener('input', filterTable)
);

// ── Modal ─────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  const isEdit = !!id;

  document.getElementById('modal-title').textContent = isEdit ? 'Edit User' : 'Add User';
  document.getElementById('save-user-btn').textContent = isEdit ? 'Save Changes' : 'Create User';
  document.getElementById('password-label').textContent = isEdit ? 'New Password (leave blank to keep)' : 'Password *';
  document.getElementById('f-password').placeholder = isEdit ? 'Leave blank to keep current' : 'Min. 6 characters';
  document.getElementById('edit-extras').classList.toggle('hidden', !isEdit);

  if (isEdit) {
    const u = users.find(x => x.id === id);
    document.getElementById('f-fullname').value = u.full_name;
    document.getElementById('f-username').value = u.username;
    document.getElementById('f-username').disabled = true;
    document.getElementById('f-role').value    = u.role;
    document.getElementById('f-email').value   = u.email || '';
    document.getElementById('f-password').value = '';
    document.getElementById('f-active').checked = u.is_active;

    // Prevent admin from deactivating themselves
    const deBtn = document.getElementById('deactivate-btn');
    deBtn.disabled = (u.id === currentUser.id);
    deBtn.onclick = () => deactivateUser(u.id);
  } else {
    ['f-fullname','f-email','f-password'].forEach(f => document.getElementById(f).value = '');
    document.getElementById('f-username').value = '';
    document.getElementById('f-username').disabled = false;
    document.getElementById('f-role').value = 'cashier';
  }

  document.getElementById('user-modal').classList.remove('hidden');
  document.getElementById('f-fullname').focus();
}

function openEdit(id) { openModal(id); }
document.getElementById('add-user-btn').addEventListener('click', () => openModal());
document.getElementById('cancel-user-btn').addEventListener('click', () =>
  document.getElementById('user-modal').classList.add('hidden')
);

// Password visibility toggle
document.getElementById('toggle-pw').addEventListener('click', () => {
  const inp = document.getElementById('f-password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

// ── Save ──────────────────────────────────────
document.getElementById('save-user-btn').addEventListener('click', async () => {
  const full_name = document.getElementById('f-fullname').value.trim();
  const username  = document.getElementById('f-username').value.trim();
  const role      = document.getElementById('f-role').value;
  const email     = document.getElementById('f-email').value.trim() || null;
  const password  = document.getElementById('f-password').value;
  const is_active = document.getElementById('f-active').checked;

  if (!full_name) { toast('Full name is required', 'error'); return; }
  if (!editingId && !username) { toast('Username is required', 'error'); return; }
  if (!editingId && !password) { toast('Password is required', 'error'); return; }
  if (password && password.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }

  const body = { full_name, role, email, is_active };
  if (!editingId) { body.username = username; body.password = password; }
  if (editingId && password) body.password = password;

  const btn = document.getElementById('save-user-btn');
  btn.disabled = true;
  try {
    if (editingId) await api.put(`/users/${editingId}`, body);
    else           await api.post('/users', body);
    toast(editingId ? 'User updated!' : 'User created!', 'success');
    document.getElementById('user-modal').classList.add('hidden');
    loadUsers();
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
});

// ── Deactivate ────────────────────────────────
async function deactivateUser(id) {
  const u = users.find(x => x.id === id);
  if (!confirm(`Deactivate "${u.full_name}"? They will not be able to log in.`)) return;
  try {
    await api.delete(`/users/${id}`);
    toast('User deactivated.', 'success');
    document.getElementById('user-modal').classList.add('hidden');
    loadUsers();
  } catch(e) { toast(e.message, 'error'); }
}

loadUsers();
</script>
</body>
</html>
