<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS System — Login</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo .wordmark {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }
    .login-logo .tagline {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    .login-card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    #error-msg {
      background: rgba(255,79,109,0.1);
      border: 1px solid rgba(255,79,109,0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="wordmark">⬡ POS</div>
      <div class="tagline">Point of Sale System</div>
    </div>

    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account to continue.</p>

      <div id="error-msg" class="hidden"></div>

      <div class="form-group">
        <label>Username</label>
        <input id="username" type="text" class="form-control" placeholder="Enter your username" autocomplete="username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button id="login-btn" class="btn btn-primary btn-lg w-full" style="margin-top:8px;">
        Sign In
      </button>
    </div>

    <div class="login-footer">Default: admin / admin123</div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        errEl.classList.remove('hidden');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.add('hidden');
      try {
        const data = await api.post('/auth/login', { username, password });
        Auth.set(data.token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
