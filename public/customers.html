<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customers — POS</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>requireAuth(); injectShell('customers');</script>

<div class="main-content">
  
<div class="page-header">
  <div><h1>Customers</h1><p>Customer database and purchase history</p></div>
  <button class="btn btn-primary" id="add-btn">+ Add Customer</button>
</div>

<div class="card">
  <div style="margin-bottom:16px">
    <input id="search" class="form-control" placeholder="Search by name or phone…" style="max-width:280px"/>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Loyalty Pts</th><th>Since</th><th></th></tr></thead>
      <tbody id="customers-table"><tr><td colspan="6" class="text-muted text-center">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay hidden" id="cust-modal">
  <div class="modal">
    <h2 id="modal-title">Add Customer</h2>
    <div class="form-group"><label>Full Name *</label><input id="f-name" class="form-control"/></div>
    <div class="form-group"><label>Phone</label><input id="f-phone" class="form-control"/></div>
    <div class="form-group"><label>Email</label><input id="f-email" class="form-control" type="email"/></div>
    <div class="form-group"><label>Address</label><input id="f-address" class="form-control"/></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary w-full" id="save-btn">Save</button>
      <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

</div>

<script>
let customers = [];
let editingId = null;

async function load() {
  try {
    customers = await api.get('/customers');
    render(customers);
  } catch(e) { toast(e.message, 'error'); }
}

function render(list) {
  const tbody = document.getElementById('customers-table');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-muted text-center">No customers yet</td></tr>'; return; }
  tbody.innerHTML = list.map(c => `
    <tr>
      <td><strong>${c.name}</strong></td>
      <td>${c.phone || '—'}</td>
      <td>${c.email || '—'}</td>
      <td class="text-mono">${c.loyalty_points || 0}</td>
      <td class="text-muted">${fmt.date(c.created_at)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openEdit(${c.id})">Edit</button></td>
    </tr>`).join('');
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  render(customers.filter(c => c.name.toLowerCase().includes(q) || (c.phone||'').includes(q)));
});

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit Customer' : 'Add Customer';
  if (id) {
    const c = customers.find(x => x.id === id);
    document.getElementById('f-name').value    = c.name;
    document.getElementById('f-phone').value   = c.phone || '';
    document.getElementById('f-email').value   = c.email || '';
    document.getElementById('f-address').value = c.address || '';
  } else {
    ['f-name','f-phone','f-email','f-address'].forEach(f => document.getElementById(f).value = '');
  }
  document.getElementById('cust-modal').classList.remove('hidden');
}

function openEdit(id) { openModal(id); }
document.getElementById('add-btn').addEventListener('click', () => openModal());
document.getElementById('cancel-btn').addEventListener('click', () => document.getElementById('cust-modal').classList.add('hidden'));

document.getElementById('save-btn').addEventListener('click', async () => {
  const body = {
    name:    document.getElementById('f-name').value.trim(),
    phone:   document.getElementById('f-phone').value.trim() || null,
    email:   document.getElementById('f-email').value.trim() || null,
    address: document.getElementById('f-address').value.trim() || null,
  };
  if (!body.name) { toast('Name is required', 'error'); return; }
  try {
    if (editingId) await api.put(`/customers/${editingId}`, body);
    else await api.post('/customers', body);
    toast('Customer saved!', 'success');
    document.getElementById('cust-modal').classList.add('hidden');
    load();
  } catch(e) { toast(e.message, 'error'); }
});

load();
</script>
</body>
</html>
