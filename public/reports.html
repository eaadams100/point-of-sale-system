<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports — POS</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>requireAuth(); requireRole('admin','manager'); injectShell('reports');</script>

<div class="main-content">
<div class="page-header">
  <div><h1>Reports</h1><p>Business performance analytics</p></div>
  <div style="display:flex;gap:8px">
    <select id="period-select" class="form-control" style="width:140px">
      <option value="today">Today</option>
      <option value="week">Last 7 Days</option>
      <option value="month" selected>Last 30 Days</option>
    </select>
  </div>
</div>

<div class="stat-grid" id="stat-grid">
  <div class="stat-card"><div class="label">Total Revenue</div><div class="value success" id="r-revenue">—</div></div>
  <div class="stat-card"><div class="label">Transactions</div><div class="value accent" id="r-txns">—</div></div>
  <div class="stat-card"><div class="label">Avg Sale</div><div class="value" id="r-avg">—</div></div>
  <div class="stat-card"><div class="label">Total Discounts</div><div class="value warning" id="r-disc">—</div></div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px">
  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted)">Top Products</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Product</th><th class="text-right">Units Sold</th><th class="text-right">Revenue</th></tr></thead>
        <tbody id="top-products"><tr><td colspan="4" class="text-muted text-center">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted)">Inventory Status</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Product</th><th>Category</th><th class="text-right">Stock</th><th>Status</th></tr></thead>
        <tbody id="inv-table"><tr><td colspan="4" class="text-muted text-center">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

</div>

<script>
async function loadReports() {
  const period = document.getElementById('period-select').value;

  try {
    const data = await api.get(`/reports/sales-summary?period=${period}`);
    const s = data.summary;
    document.getElementById('r-revenue').textContent = fmt.currency(s.total_revenue || 0);
    document.getElementById('r-txns').textContent    = s.total_transactions || 0;
    document.getElementById('r-avg').textContent     = fmt.currency(s.avg_sale_value || 0);
    document.getElementById('r-disc').textContent    = fmt.currency(s.total_discounts || 0);
  } catch(e) { toast(e.message, 'error'); }

  try {
    const top = await api.get(`/reports/top-products?period=${period}`);
    const tbody = document.getElementById('top-products');
    tbody.innerHTML = top.length
      ? top.map((p, i) => `
          <tr>
            <td class="text-muted">${i+1}</td>
            <td><strong>${p.product_name}</strong></td>
            <td class="text-right text-mono">${p.units_sold}</td>
            <td class="text-right text-mono">${fmt.currency(p.revenue)}</td>
          </tr>`).join('')
      : '<tr><td colspan="4" class="text-muted text-center">No sales in this period</td></tr>';
  } catch(e) {}

  try {
    const inv = await api.get('/reports/inventory');
    const tbody = document.getElementById('inv-table');
    tbody.innerHTML = inv.length
      ? inv.map(p => `
          <tr>
            <td><strong>${p.name}</strong></td>
            <td>${p.category || '—'}</td>
            <td class="text-right text-mono">${p.quantity}</td>
            <td><span class="badge ${p.is_low_stock ? 'badge-danger' : 'badge-success'}">${p.is_low_stock ? 'Low' : 'OK'}</span></td>
          </tr>`).join('')
      : '<tr><td colspan="4" class="text-muted text-center">No products</td></tr>';
  } catch(e) {}
}

document.getElementById('period-select').addEventListener('change', loadReports);
loadReports();
</script>
</body>
</html>
