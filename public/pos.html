<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS — Cashier</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .pos-layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        height: 100%;
        overflow: hidden;
      }
      #main-content {
        padding: 0 !important;
        overflow: hidden;
      }

      /* Left panel */
      .pos-left {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        overflow: hidden;
        background: var(--bg);
      }
      .pos-search-bar {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 8px;
        background: var(--surface);
      }

      /* Product grid */
      .product-grid {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
        align-content: start;
      }

      .product-tile {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 10px;
        cursor: pointer;
        text-align: center;
        transition: all 0.12s;
        box-shadow: var(--shadow-xs);
        user-select: none;
      }
      .product-tile:hover {
        border-color: var(--accent);
        box-shadow: var(--shadow-sm);
        transform: translateY(-1px);
      }
      .product-tile:active {
        transform: scale(0.97);
      }
      .product-tile.out-of-stock {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .product-tile .p-name {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 5px;
        line-height: 1.3;
      }
      .product-tile .p-price {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--accent);
        font-weight: 700;
      }
      .product-tile .p-stock {
        font-size: 10px;
        color: var(--text-light);
        margin-top: 3px;
      }

      /* Right panel — Cart */
      .cart-right {
        display: flex;
        flex-direction: column;
        background: var(--surface);
        height: 100%;
      }
      .cart-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .cart-header h3 {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }

      /* Customer selector row */
      .cart-customer {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
      }

      /* Cart items */
      .cart-items {
        flex: 1;
        overflow-y: auto;
      }
      .cart-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 4px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }
      .cart-item:last-child {
        border-bottom: none;
      }
      .cart-item .ci-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .cart-item .ci-price {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--accent);
        text-align: right;
        font-weight: 700;
      }
      .cart-item .ci-controls {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 5px;
      }
      .cart-item .ci-controls button {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-2);
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.1s;
      }
      .cart-item .ci-controls button:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-s);
      }
      .cart-item .ci-qty {
        font-family: var(--mono);
        font-size: 13px;
        width: 28px;
        text-align: center;
        color: var(--text);
      }
      .cart-item .ci-remove {
        color: var(--danger) !important;
      }
      .cart-item .ci-remove:hover {
        border-color: var(--danger) !important;
        background: var(--danger-s) !important;
      }

      .cart-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-light);
        font-size: 13px;
        gap: 8px;
        padding: 40px;
      }
      .cart-empty .icon {
        font-size: 32px;
        opacity: 0.25;
      }

      /* Discount / coupon rows */
      .discount-row {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 0 14px 10px;
      }
      .discount-row label {
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
        font-weight: 500;
      }

      /* Totals */
      .cart-totals {
        padding: 14px 16px;
        border-top: 1px solid var(--border);
        background: var(--surface2);
      }
      .total-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        padding: 3px 0;
        color: var(--text-2);
      }
      .total-row.grand {
        font-size: 17px;
        font-weight: 700;
        color: var(--text);
        font-family: var(--mono);
        padding-top: 10px;
        margin-top: 6px;
        border-top: 1px solid var(--border);
      }

      /* Payment & checkout */
      .cart-actions {
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: var(--surface);
        border-top: 1px solid var(--border);
      }
      .split-row {
        display: grid;
        grid-template-columns: 1fr 100px 32px;
        gap: 6px;
        margin-bottom: 6px;
        align-items: center;
      }

      /* Receipt */
      .receipt {
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.9;
        background: #fff;
        color: #111;
        padding: 20px;
        border-radius: 8px;
      }
      .receipt .r-title {
        text-align: center;
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .receipt .r-divider {
        border: none;
        border-top: 1px dashed #ccc;
        margin: 8px 0;
      }
      .receipt .r-row {
        display: flex;
        justify-content: space-between;
      }
      .receipt .r-total {
        font-weight: 700;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <script src="/js/api.js"></script>
    <script src="/js/shell.js"></script>
    <script src="/js/scanner.js"></script>
    <script>
      requireAuth();
      injectShell("pos");
    </script>
    <div class="main-content">
      
    <div id="page-wrap">
      <div class="pos-layout" id="pos-layout">
        <!-- Mobile tab bar (hidden on desktop via CSS) -->
        <div class="pos-tab-bar" style="grid-column: 1/-1">
          <button
            class="pos-tab-btn active"
            id="tab-products"
            onclick="switchPosTab('products')"
          >
            🛍 Products
          </button>
          <button
            class="pos-tab-btn"
            id="tab-cart"
            onclick="switchPosTab('cart')"
          >
            🛒 Cart
            <span class="cart-count hidden" id="cart-count-badge">0</span>
          </button>
        </div>
        <!-- LEFT: Products -->
        <div class="pos-left">
          <div class="pos-search-bar">
            <input
              id="search-input"
              class="form-control"
              placeholder="Search product name… (scanner works anywhere on this page)"
              autocomplete="off"
            />
            <button class="btn btn-ghost" id="clear-search">✕</button>
            <button
              class="btn btn-ghost btn-sm"
              id="test-scan-btn"
              title="Test scanner with a random barcode"
              style="white-space: nowrap"
            >
              ⌖ Test Scan
            </button>
          </div>
          <div class="product-grid" id="product-grid">
            <div
              class="text-muted text-center"
              style="grid-column: 1/-1; padding: 40px"
            >
              Loading products…
            </div>
          </div>
        </div>

        <!-- RIGHT: Cart -->
        <div class="cart-right">
          <div class="cart-header">
            <h3>🛒 Cart</h3>
            <button class="btn btn-ghost btn-sm" id="clear-cart-btn">
              Clear
            </button>
          </div>

          <!-- Customer selector -->
          <div
            style="padding: 10px 16px; border-bottom: 1px solid var(--border)"
          >
            <div style="display: flex; gap: 8px; align-items: center">
              <select
                id="customer-select"
                class="form-control"
                style="font-size: 12px"
              >
                <option value="">👤 Walk-in customer</option>
              </select>
            </div>
            <div
              id="loyalty-info"
              class="hidden"
              style="
                margin-top: 6px;
                font-size: 12px;
                color: var(--warning);
                display: flex;
                align-items: center;
                justify-content: space-between;
              "
            >
              <span
                >⭐ <span id="loyalty-balance">0</span> points available</span
              >
              <button
                class="btn btn-ghost btn-sm"
                id="use-points-btn"
                style="font-size: 11px; padding: 3px 8px"
              >
                Use Points
              </button>
            </div>
            <div
              id="points-redeemed-info"
              class="hidden"
              style="margin-top: 4px; font-size: 12px; color: var(--accent2)"
            >
              ✓ Redeeming <span id="pts-redeem-amount">0</span> pts =
              <span id="pts-ghs-value">GHS 0.00</span> off
              <button
                onclick="cancelPointsRedeem()"
                style="
                  background: none;
                  border: none;
                  color: var(--danger);
                  cursor: pointer;
                  margin-left: 6px;
                "
              >
                ✕
              </button>
            </div>
          </div>

          <div class="cart-items" id="cart-items">
            <div class="cart-empty" id="cart-empty">
              <div class="icon">⊟</div>
              <div>Cart is empty</div>
              <div style="font-size: 11px">Click a product to add it</div>
            </div>
          </div>

          <div class="discount-row">
            <label>Manual Discount (GHS)</label>
            <input
              id="discount-input"
              type="number"
              class="form-control"
              value="0"
              min="0"
              step="0.01"
            />
          </div>

          <div
            class="discount-row"
            style="border-top: 1px solid var(--border); padding-top: 10px"
          >
            <label>Coupon Code</label>
            <div style="display: flex; gap: 6px; flex: 1">
              <input
                id="coupon-input"
                class="form-control"
                placeholder="e.g. SAVE10"
                style="text-transform: uppercase"
              />
              <button
                class="btn btn-ghost btn-sm"
                id="apply-coupon-btn"
                style="white-space: nowrap"
              >
                Apply
              </button>
              <button
                class="btn btn-ghost btn-sm hidden"
                id="remove-coupon-btn"
                style="color: var(--danger)"
              >
                ✕
              </button>
            </div>
          </div>
          <div
            id="coupon-feedback"
            class="hidden"
            style="padding: 0 20px 8px; font-size: 12px"
          ></div>

          <div class="cart-totals">
            <div class="total-row">
              <span>Subtotal</span><span id="subtotal">GHS 0.00</span>
            </div>
            <div class="total-row">
              <span>Discount</span><span id="discount-display">- GHS 0.00</span>
            </div>
            <div class="total-row grand">
              <span>TOTAL</span><span id="grand-total">GHS 0.00</span>
            </div>
          </div>

          <!-- Payment section -->
          <div class="cart-actions" style="padding-bottom: 0">
            <div
              style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 8px;
              "
            >
              <span
                style="
                  font-size: 12px;
                  font-weight: 700;
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                  color: var(--text-muted);
                "
                >Payment</span
              >
              <button
                class="btn btn-ghost btn-sm"
                id="toggle-split-btn"
                style="font-size: 11px"
              >
                + Split
              </button>
            </div>

            <!-- Single payment (default) -->
            <div id="single-payment">
              <select id="payment-method" class="form-control">
                <option value="cash">💵 Cash</option>
                <option value="mobile_money">📱 Mobile Money (Paystack)</option>
                <option value="card">💳 Card</option>
              </select>

              <!-- Mobile money fields (shown when mobile_money selected) -->
              <div
                id="momo-fields"
                class="hidden"
                style="
                  margin-top: 8px;
                  display: flex;
                  flex-direction: column;
                  gap: 6px;
                "
              >
                <select id="momo-provider" class="form-control">
                  <option value="mtn">MTN Mobile Money</option>
                  <option value="vodafone">Vodafone Cash</option>
                  <option value="tigo">AirtelTigo Money</option>
                </select>
                <input
                  id="momo-phone"
                  class="form-control"
                  placeholder="Phone e.g. 0241234567"
                />
                <div
                  id="momo-status"
                  class="hidden"
                  style="
                    font-size: 12px;
                    padding: 8px 10px;
                    border-radius: 6px;
                    border: 1px solid var(--border);
                  "
                ></div>
              </div>
            </div>

            <!-- Split payment (shown when split is toggled) -->
            <div id="split-payment" class="hidden">
              <div id="split-rows"></div>
              <button
                class="btn btn-ghost btn-sm w-full"
                id="add-split-btn"
                style="margin-top: 6px"
              >
                + Add payment method
              </button>
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  font-size: 12px;
                  margin-top: 8px;
                  padding-top: 8px;
                  border-top: 1px solid var(--border);
                "
              >
                <span style="color: var(--text-muted)">Remaining</span>
                <span
                  id="split-remaining"
                  style="
                    font-family: var(--mono);
                    font-weight: 700;
                    color: var(--warning);
                  "
                  >GHS 0.00</span
                >
              </div>
            </div>
          </div>

          <div class="cart-actions" style="padding-top: 8px">
            <button class="btn btn-success btn-lg w-full" id="checkout-btn">
              Checkout →
            </button>
          </div>
        </div>
      </div>

      <!-- Receipt Modal -->
      <div class="modal-overlay hidden" id="receipt-modal">
        <div class="modal" style="max-width: 360px">
          <div id="receipt-content"></div>
          <div style="display: flex; gap: 10px; margin-top: 20px">
            <button class="btn btn-ghost w-full" onclick="window.print()">
              🖨 Print
            </button>
            <button class="btn btn-primary w-full" id="receipt-new">
              New Sale
            </button>
          </div>
          <a
            id="full-receipt-link"
            href="#"
            target="_blank"
            class="btn btn-ghost btn-sm w-full mt-1"
            style="text-align: center; text-decoration: none; display: block"
          >
            ↗ Open Full Receipt
          </a>
          <button class="btn btn-ghost btn-sm w-full mt-1" id="receipt-close">
            Close
          </button>
        </div>
      </div>

    </div>
      <script>
        let allProducts = [];
        let cart = [];
        let appliedCoupon = null;
        let loyaltyRedeem = null; // { points, ghs_value }
        let customers = [];
        let redeemRate = 100;

        // ── Load customers for selector ───────────────
        async function loadCustomers() {
          try {
            customers = await api.get("/customers");
            const sel = document.getElementById("customer-select");
            sel.innerHTML =
              '<option value="">👤 Walk-in customer</option>' +
              customers
                .map(
                  (c) =>
                    `<option value="${c.id}">${c.name}${c.phone ? " (" + c.phone + ")" : ""}</option>`,
                )
                .join("");
            // Also get loyalty rate from settings
            const settings = await api.get("/settings");
            redeemRate = parseFloat(settings.loyalty_redeem || 100);
          } catch (_) {}
        }

        document
          .getElementById("customer-select")
          .addEventListener("change", () => {
            cancelPointsRedeem();
            const id = parseInt(
              document.getElementById("customer-select").value,
            );
            const c = customers.find((x) => x.id === id);
            const infoEl = document.getElementById("loyalty-info");
            if (c && c.loyalty_points > 0) {
              document.getElementById("loyalty-balance").textContent =
                c.loyalty_points;
              infoEl.classList.remove("hidden");
            } else {
              infoEl.classList.add("hidden");
            }
          });

        document
          .getElementById("use-points-btn")
          .addEventListener("click", async () => {
            const customerId = parseInt(
              document.getElementById("customer-select").value,
            );
            const c = customers.find((x) => x.id === customerId);
            if (!c) return;
            const subtotal = cart.reduce(
              (s, i) => s + i.product.price * i.quantity,
              0,
            );
            // Suggest all available points, capped at order value
            const maxPts = Math.min(
              c.loyalty_points,
              Math.floor(subtotal * redeemRate),
            );
            const input = prompt(
              `Use how many points? (Available: ${c.loyalty_points}, max useful: ${maxPts})`,
            );
            if (!input) return;
            const pts = parseInt(input);
            if (!pts || pts <= 0) {
              toast("Invalid amount", "error");
              return;
            }
            try {
              const result = await api.post("/loyalty/validate-redeem", {
                customer_id: customerId,
                points_to_redeem: pts,
                order_total: subtotal,
              });
              loyaltyRedeem = { points: pts, ghs_value: result.ghs_value };
              document.getElementById("pts-redeem-amount").textContent = pts;
              document.getElementById("pts-ghs-value").textContent =
                fmt.currency(result.ghs_value);
              document
                .getElementById("points-redeemed-info")
                .classList.remove("hidden");
              document.getElementById("use-points-btn").classList.add("hidden");
              updateTotals();
              toast(
                `Using ${pts} points = ${fmt.currency(result.ghs_value)} off`,
                "success",
              );
            } catch (e) {
              toast(e.message, "error");
            }
          });

        function cancelPointsRedeem() {
          loyaltyRedeem = null;
          document
            .getElementById("points-redeemed-info")
            .classList.add("hidden");
          document.getElementById("use-points-btn").classList.remove("hidden");
          updateTotals();
        }

        // ── Load products ─────────────────────────────
        async function loadProducts() {
          try {
            allProducts = await api.get("/products");
            renderProducts(allProducts);
          } catch (e) {
            toast(e.message, "error");
          }
        }

        function renderProducts(list) {
          const grid = document.getElementById("product-grid");
          if (!list.length) {
            grid.innerHTML =
              '<div class="text-muted text-center" style="grid-column:1/-1;padding:40px">No products found</div>';
            return;
          }
          grid.innerHTML = list
            .map(
              (p) => `
    <div class="product-tile ${p.quantity === 0 ? "out-of-stock" : ""}"
         data-id="${p.id}" ${p.quantity === 0 ? 'title="Out of stock"' : ""}>
      <div class="p-name">${p.name}</div>
      <div class="p-price">${fmt.currency(p.price)}</div>
      <div class="p-stock">Stock: ${p.quantity}</div>
    </div>
  `,
            )
            .join("");

          grid
            .querySelectorAll(".product-tile:not(.out-of-stock)")
            .forEach((tile) => {
              tile.addEventListener("click", () => {
                const product = allProducts.find(
                  (p) => p.id == tile.dataset.id,
                );
                if (product) addToCart(product);
              });
            });
        }

        // ── Search & barcode input ────────────────────
        const searchInput = document.getElementById("search-input");
        searchInput.addEventListener("input", async () => {
          const q = searchInput.value.trim();
          if (!q) {
            renderProducts(allProducts);
            return;
          }
          const filtered = allProducts.filter(
            (p) =>
              p.name.toLowerCase().includes(q.toLowerCase()) ||
              (p.barcode && p.barcode.includes(q)),
          );
          renderProducts(filtered);
        });

        document
          .getElementById("clear-search")
          .addEventListener("click", () => {
            searchInput.value = "";
            renderProducts(allProducts);
          });

        // ── Barcode scanner service ───────────────────
        BarcodeScanner.init();

        BarcodeScanner.onScan(async (code) => {
          // First try exact match in already-loaded products
          const local = allProducts.find((p) => p.barcode === code);
          if (local) {
            if (local.quantity === 0) {
              toast(`"${local.name}" is out of stock`, "warning");
              BarcodeScanner.scanError();
              return;
            }
            addToCart(local);
            BarcodeScanner.scanSuccess();
            return;
          }

          // Fallback: hit the API (covers barcodes not yet in local cache)
          try {
            const product = await api.get(
              `/products/barcode/${encodeURIComponent(code)}`,
            );
            if (product.quantity === 0) {
              toast(`"${product.name}" is out of stock`, "warning");
              BarcodeScanner.scanError();
              return;
            }
            // Add to local cache so next scan is instant
            const idx = allProducts.findIndex((p) => p.id === product.id);
            if (idx === -1) allProducts.push(product);
            else allProducts[idx] = product;

            addToCart(product);
            BarcodeScanner.scanSuccess();
          } catch {
            toast(`Barcode not found: ${code}`, "error");
            BarcodeScanner.scanError();
          }
        });

        // ── Cart logic ────────────────────────────────
        function addToCart(product) {
          const existing = cart.find((i) => i.product.id === product.id);
          const inCart = existing ? existing.quantity : 0;
          if (inCart >= product.quantity) {
            toast(`Max stock reached for "${product.name}"`, "warning");
            return;
          }
          if (existing) existing.quantity++;
          else cart.push({ product, quantity: 1 });
          renderCart();
          toast(`Added: ${product.name}`, "success");
          // On mobile, jump to cart tab after adding
          if (window.innerWidth <= 768) switchPosTab("cart");
        }

        function updateQty(productId, delta) {
          const idx = cart.findIndex((i) => i.product.id === productId);
          if (idx === -1) return;
          cart[idx].quantity += delta;
          if (cart[idx].quantity <= 0) cart.splice(idx, 1);
          renderCart();
        }

        function renderCart() {
          const container = document.getElementById("cart-items");
          const emptyEl = document.getElementById("cart-empty");
          updateCartBadge();

          if (!cart.length) {
            container.innerHTML = "";
            container.appendChild(emptyEl);
            emptyEl.style.display = "flex";
            updateTotals();
            return;
          }

          container.innerHTML = cart
            .map(
              (item) => `
    <div class="cart-item">
      <div>
        <div class="ci-name">${item.product.name}</div>
        <div class="ci-controls">
          <button onclick="updateQty(${item.product.id}, -1)">−</button>
          <span class="ci-qty">${item.quantity}</span>
          <button onclick="updateQty(${item.product.id}, 1)">+</button>
          <button class="ci-remove" onclick="removeFromCart(${item.product.id})" title="Remove">✕</button>
        </div>
      </div>
      <div class="ci-price">${fmt.currency(item.product.price * item.quantity)}</div>
    </div>
  `,
            )
            .join("");

          updateTotals();
        }

        function removeFromCart(productId) {
          cart = cart.filter((i) => i.product.id !== productId);
          renderCart();
        }

        document
          .getElementById("clear-cart-btn")
          .addEventListener("click", () => {
            cart = [];
            renderCart();
          });

        // ── Totals ────────────────────────────────────
        function updateTotals() {
          const subtotal = cart.reduce(
            (s, i) => s + i.product.price * i.quantity,
            0,
          );
          const manualDisc = parseFloat(
            document.getElementById("discount-input").value || 0,
          );
          const couponDisc = appliedCoupon ? appliedCoupon.discount_amount : 0;
          const loyaltyDisc = loyaltyRedeem ? loyaltyRedeem.ghs_value : 0;
          const totalDiscount = manualDisc + couponDisc + loyaltyDisc;
          const total = Math.max(0, subtotal - totalDiscount);
          document.getElementById("subtotal").textContent =
            fmt.currency(subtotal);
          document.getElementById("discount-display").textContent =
            `- ${fmt.currency(totalDiscount)}`;
          document.getElementById("grand-total").textContent =
            fmt.currency(total);
        }

        document
          .getElementById("discount-input")
          .addEventListener("input", updateTotals);

        // ── Coupon logic ──────────────────────────────
        document
          .getElementById("apply-coupon-btn")
          .addEventListener("click", async () => {
            const code = document
              .getElementById("coupon-input")
              .value.trim()
              .toUpperCase();
            if (!code) {
              toast("Enter a coupon code", "warning");
              return;
            }
            const subtotal = cart.reduce(
              (s, i) => s + i.product.price * i.quantity,
              0,
            );
            try {
              const result = await api.post("/coupons/validate", {
                code,
                order_total: subtotal,
              });
              appliedCoupon = result;
              document.getElementById("coupon-input").disabled = true;
              document
                .getElementById("apply-coupon-btn")
                .classList.add("hidden");
              document
                .getElementById("remove-coupon-btn")
                .classList.remove("hidden");
              const fb = document.getElementById("coupon-feedback");
              fb.classList.remove("hidden");
              fb.style.color = "var(--accent2)";
              fb.textContent = `✓ ${result.description || result.code} — saving ${fmt.currency(result.discount_amount)}`;
              updateTotals();
              toast(
                `Coupon applied: ${fmt.currency(result.discount_amount)} off!`,
                "success",
              );
            } catch (e) {
              const fb = document.getElementById("coupon-feedback");
              fb.classList.remove("hidden");
              fb.style.color = "var(--danger)";
              fb.textContent = `✗ ${e.message}`;
              toast(e.message, "error");
            }
          });

        document
          .getElementById("remove-coupon-btn")
          .addEventListener("click", () => {
            appliedCoupon = null;
            document.getElementById("coupon-input").value = "";
            document.getElementById("coupon-input").disabled = false;
            document
              .getElementById("apply-coupon-btn")
              .classList.remove("hidden");
            document
              .getElementById("remove-coupon-btn")
              .classList.add("hidden");
            document.getElementById("coupon-feedback").classList.add("hidden");
            updateTotals();
            toast("Coupon removed", "info");
          });

        // ── Checkout ──────────────────────────────────
        document
          .getElementById("checkout-btn")
          .addEventListener("click", async () => {
            if (!cart.length) {
              toast("Cart is empty", "warning");
              return;
            }

            const manualDisc = parseFloat(
              document.getElementById("discount-input").value || 0,
            );
            const couponDisc = appliedCoupon
              ? appliedCoupon.discount_amount
              : 0;
            const loyaltyDisc = loyaltyRedeem ? loyaltyRedeem.ghs_value : 0;
            const discount = manualDisc + couponDisc + loyaltyDisc;
            const customer_id =
              parseInt(document.getElementById("customer-select").value) ||
              null;
            const grandTotal =
              parseFloat(
                document
                  .getElementById("grand-total")
                  .textContent.replace(/[^0-9.]/g, ""),
              ) || 0;

            // Build payments list
            let payment_method, paymentsList;
            if (isSplit) {
              const rows = [...document.querySelectorAll(".split-row")];
              paymentsList = rows
                .map((r) => ({
                  method: r.querySelector(".split-method").value,
                  amount:
                    parseFloat(r.querySelector(".split-amount").value) || 0,
                }))
                .filter((p) => p.amount > 0);
              if (!paymentsList.length) {
                toast("Add payment amounts", "warning");
                return;
              }
              const paidTotal = paymentsList.reduce((s, p) => s + p.amount, 0);
              if (Math.abs(paidTotal - grandTotal) > 0.01) {
                toast(
                  `Payments (${fmt.currency(paidTotal)}) must equal total (${fmt.currency(grandTotal)})`,
                  "error",
                );
                return;
              }
              payment_method = "split";
            } else {
              payment_method = document.getElementById("payment-method").value;
              paymentsList = [{ method: payment_method, amount: grandTotal }];
            }

            const btn = document.getElementById("checkout-btn");
            btn.disabled = true;
            btn.textContent = "Processing…";

            try {
             // For custom mobile money payment
if (!isSplit && payment_method === "mobile_money") {
  // Store sale data for later completion
  pendingSaleData = {
    items: cart.map(i => ({ product_id: i.product.id, quantity: i.quantity })),
    discount, tax: 0, payment_method, customer_id,
    coupon_code: appliedCoupon ? appliedCoupon.code : null,
    payments: [{ method: payment_method, amount: grandTotal }]
  };
  
  const paymentResult = await initiateCustomPayment(grandTotal, null);
  if (!paymentResult) {
    pendingSaleData = null;
    btn.disabled = false;
    btn.textContent = "Checkout →";
    return;
  }
  
  // The OTP submission will call completeSaleAfterPayment()
  btn.disabled = false;
  btn.textContent = "Checkout →";
  return;
}

              const saleData = {
                items: cart.map((i) => ({
                  product_id: i.product.id,
                  quantity: i.quantity,
                })),
                discount,
                tax: 0,
                payment_method,
                customer_id,
                coupon_code: appliedCoupon ? appliedCoupon.code : null,
                payments: paymentsList,
              };
              const sale = await api.post("/sales", saleData);

              // Deduct redeemed loyalty points
              if (loyaltyRedeem && customer_id) {
                await api.post("/loyalty/adjust", {
                  customer_id,
                  points: -loyaltyRedeem.points,
                  note: `Redeemed on sale ${sale.reference}`,
                });
              }

              showReceipt(sale);
              // Full reset
              cart = [];
              appliedCoupon = null;
              loyaltyRedeem = null;
              isSplit = false;
              document.getElementById("coupon-input").value = "";
              document.getElementById("coupon-input").disabled = false;
              document
                .getElementById("apply-coupon-btn")
                .classList.remove("hidden");
              document
                .getElementById("remove-coupon-btn")
                .classList.add("hidden");
              document
                .getElementById("coupon-feedback")
                .classList.add("hidden");
              document
                .getElementById("points-redeemed-info")
                .classList.add("hidden");
              document
                .getElementById("use-points-btn")
                .classList.remove("hidden");
              document.getElementById("loyalty-info").classList.add("hidden");
              document.getElementById("customer-select").value = "";
              document
                .getElementById("single-payment")
                .classList.remove("hidden");
              document.getElementById("split-payment").classList.add("hidden");
              document.getElementById("toggle-split-btn").textContent =
                "+ Split";
              document.getElementById("momo-fields").classList.add("hidden");
              document.getElementById("momo-status").classList.add("hidden");
              document.getElementById("payment-method").value = "cash";
              renderCart();
              document.getElementById("discount-input").value = 0;
              await Promise.all([loadProducts(), loadCustomers()]);
            } catch (e) {
              toast(e.message, "error");
            } finally {
              btn.disabled = false;
              btn.textContent = "Checkout →";
            }
          });

        // ── Receipt ───────────────────────────────────
        function showReceipt(sale) {
          document.getElementById("full-receipt-link").href =
            `/receipt.html?id=${sale.id}`;
          const store = "My Store";
          const itemsHTML = (sale.items || [])
            .map(
              (i) =>
                `<div class="r-row"><span>${i.product_name} x${i.quantity}</span><span>GHS ${parseFloat(i.total_price).toFixed(2)}</span></div>`,
            )
            .join("");

          document.getElementById("receipt-content").innerHTML = `
    <div class="receipt">
      <div class="r-title">${store}</div>
      <div style="text-align:center;font-size:11px;color:#666">${fmt.datetime(sale.created_at || new Date())}</div>
      <div style="text-align:center;font-size:11px">Ref: ${sale.reference}</div>
      <div class="r-divider"></div>
      ${itemsHTML}
      <div class="r-divider"></div>
      <div class="r-row"><span>Subtotal</span><span>GHS ${parseFloat(sale.subtotal).toFixed(2)}</span></div>
      ${parseFloat(sale.discount) > 0 ? `<div class="r-row"><span>Discount</span><span>-GHS ${parseFloat(sale.discount).toFixed(2)}</span></div>` : ""}
      <div class="r-row r-total"><span>TOTAL</span><span>GHS ${parseFloat(sale.total_amount).toFixed(2)}</span></div>
      <div class="r-divider"></div>
      <div style="text-align:center;font-size:11px">Payment: ${sale.payment_method}</div>
      <div style="text-align:center;margin-top:10px;font-size:11px">Thank you for your purchase!</div>
    </div>
  `;
          document.getElementById("receipt-modal").classList.remove("hidden");
          document.getElementById("full-receipt-link").href =
            `/receipt.html?id=${sale.id}`;
        }

        document
          .getElementById("receipt-close")
          .addEventListener("click", () =>
            document.getElementById("receipt-modal").classList.add("hidden"),
          );

        document.getElementById("receipt-new").addEventListener("click", () => {
          document.getElementById("receipt-modal").classList.add("hidden");
          searchInput.focus();
        });

        // ── Split payment logic ───────────────────────
        let isSplit = false;

        document
          .getElementById("toggle-split-btn")
          .addEventListener("click", () => {
            isSplit = !isSplit;
            document
              .getElementById("single-payment")
              .classList.toggle("hidden", isSplit);
            document
              .getElementById("split-payment")
              .classList.toggle("hidden", !isSplit);
            document.getElementById("toggle-split-btn").textContent = isSplit
              ? "✕ Cancel Split"
              : "+ Split";
            if (isSplit) {
              initSplitRows();
            }
          });

        function initSplitRows() {
          document.getElementById("split-rows").innerHTML = "";
          addSplitRow("cash");
          addSplitRow("mobile_money");
          updateSplitRemaining();
        }

        function addSplitRow(method = "cash") {
          const row = document.createElement("div");
          row.className = "split-row";
          row.style.cssText =
            "display:grid;grid-template-columns:1fr 100px 32px;gap:6px;margin-bottom:6px;align-items:center";
          row.innerHTML = `
    <select class="form-control split-method" style="font-size:12px">
      <option value="cash"         ${method === "cash" ? "selected" : ""}>💵 Cash</option>
      <option value="mobile_money" ${method === "mobile_money" ? "selected" : ""}>📱 Mobile Money</option>
      <option value="card"         ${method === "card" ? "selected" : ""}>💳 Card</option>
    </select>
    <input type="number" class="form-control split-amount" placeholder="0.00" min="0" step="0.01" style="font-size:12px"/>
    <button class="btn btn-ghost btn-sm" onclick="this.closest('.split-row').remove();updateSplitRemaining()" style="padding:6px;color:var(--danger)">✕</button>
  `;
          row
            .querySelector(".split-amount")
            .addEventListener("input", updateSplitRemaining);
          document.getElementById("split-rows").appendChild(row);
        }

        function updateSplitRemaining() {
          const total =
            parseFloat(
              document
                .getElementById("grand-total")
                .textContent.replace(/[^0-9.]/g, ""),
            ) || 0;
          const paid = [...document.querySelectorAll(".split-amount")].reduce(
            (s, el) => s + (parseFloat(el.value) || 0),
            0,
          );
          const rem = Math.max(0, total - paid);
          document.getElementById("split-remaining").textContent =
            fmt.currency(rem);
          document.getElementById("split-remaining").style.color =
            rem > 0 ? "var(--warning)" : "var(--accent2)";
        }

        document
          .getElementById("add-split-btn")
          .addEventListener("click", () => {
            addSplitRow("cash");
            updateSplitRemaining();
          });

        // ── Mobile Money (Paystack) logic ─────────────
        document
          .getElementById("payment-method")
          .addEventListener("change", function () {
            const isMomo = this.value === "mobile_money";
            document
              .getElementById("momo-fields")
              .classList.toggle("hidden", !isMomo);
          });

       // ── Custom Payment Gateway (Mobile Money) ─────────────
let customPaymentRef = null;
let pendingSaleData = null;

async function initiateCustomPayment(amount, saleId) {
  const phone = document.getElementById('momo-phone').value.trim();
  const provider = document.getElementById('momo-provider').value;
  const statusEl = document.getElementById('momo-status');

  if (!phone) { toast('Enter the customer mobile number', 'error'); return null; }

  // Validate test phone numbers
  const validNumbers = ['0240000000', '0270000000', '0260000000'];
  if (!validNumbers.includes(phone.replace(/\s/g, ''))) {
    toast('Use test number: 0240000000 (MTN), 0270000000 (Vodafone), or 0260000000 (AirtelTigo)', 'warning');
    return null;
  }

  statusEl.classList.remove('hidden');
  statusEl.style.background = 'var(--surface2)';
  statusEl.textContent = '⏳ Initializing payment...';

  try {
    const result = await api.post('/custom-payment/mobile-money', {
      amount, phone, provider, sale_id: saleId
    });
    
    customPaymentRef = result.data.reference;
    
    // Show OTP input field (test OTP is 123456)
    statusEl.innerHTML = `
      📱 ${result.data.display_text}<br/>
      <div style="margin-top:10px; display:flex; gap:8px;">
        <input type="text" id="custom-otp-input" placeholder="Enter OTP" 
               style="flex:1; padding:8px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:white;">
        <button id="custom-submit-otp" class="btn btn-primary btn-sm">Verify</button>
      </div>
    `;
    
    document.getElementById('custom-submit-otp')?.addEventListener('click', async () => {
      const otp = document.getElementById('custom-otp-input').value;
      if (otp) await submitCustomOTP(customPaymentRef, otp);
    });
    
    return result;
  } catch(e) {
    statusEl.style.background = 'rgba(220,38,38,0.1)';
    statusEl.style.color = 'var(--danger)';
    statusEl.textContent = `✗ ${e.message}`;
    return null;
  }
}

async function submitCustomOTP(reference, otp) {
  const statusEl = document.getElementById('momo-status');
  statusEl.textContent = '⏳ Verifying OTP...';
  
  try {
    const result = await api.post('/custom-payment/submit-otp', { reference, otp });
    
    if (result.status) {
      statusEl.style.background = 'rgba(5,150,105,0.1)';
      statusEl.style.color = 'var(--accent2)';
      statusEl.textContent = '✓ Payment successful!';
      
      // Complete the sale if pending data exists
      if (pendingSaleData) {
        await completeSaleAfterPayment();
      } else {
        // Trigger checkout again if needed
        document.getElementById('checkout-btn').click();
      }
    } else {
      throw new Error(result.message || 'Invalid OTP');
    }
  } catch(e) {
    statusEl.style.background = 'rgba(220,38,38,0.1)';
    statusEl.style.color = 'var(--danger)';
    statusEl.textContent = `✗ ${e.message}`;
  }
}

async function verifyCustomPayment(reference) {
  try {
    const result = await api.get(`/custom-payment/verify/${reference}`);
    return result.status === true;
  } catch(e) {
    return false;
  }
}

async function completeSaleAfterPayment() {
  if (!pendingSaleData) return;
  
  try {
    const sale = await api.post('/sales', pendingSaleData);
    
    // Deduct redeemed loyalty points
    if (loyaltyRedeem && pendingSaleData.customer_id) {
      await api.post('/loyalty/adjust', {
        customer_id: pendingSaleData.customer_id,
        points: -loyaltyRedeem.points,
        note: `Redeemed on sale ${sale.reference}`
      });
    }
    
    showReceipt(sale);
    resetAfterSale();
    pendingSaleData = null;
    await Promise.all([loadProducts(), loadCustomers()]);
  } catch(e) {
    toast(e.message, 'error');
  }
}

function resetAfterSale() {
  cart = [];
  appliedCoupon = null;
  loyaltyRedeem = null;
  isSplit = false;
  customPaymentRef = null;
  document.getElementById('coupon-input').value = '';
  document.getElementById('coupon-input').disabled = false;
  document.getElementById('apply-coupon-btn').classList.remove('hidden');
  document.getElementById('remove-coupon-btn').classList.add('hidden');
  document.getElementById('coupon-feedback').classList.add('hidden');
  document.getElementById('points-redeemed-info').classList.add('hidden');
  document.getElementById('use-points-btn').classList.remove('hidden');
  document.getElementById('loyalty-info').classList.add('hidden');
  document.getElementById('customer-select').value = '';
  document.getElementById('single-payment').classList.remove('hidden');
  document.getElementById('split-payment').classList.add('hidden');
  document.getElementById('toggle-split-btn').textContent = '+ Split';
  document.getElementById('momo-fields').classList.add('hidden');
  document.getElementById('momo-status').classList.add('hidden');
  document.getElementById('payment-method').value = 'cash';
  renderCart();
  document.getElementById('discount-input').value = 0;
}
